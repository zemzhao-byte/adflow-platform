<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdFlow - 自动化投放平台</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.22.7/dist/reset.min.css">
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/antd@5.22.7/dist/antd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<script>
window.onerror = function(msg, url, line, col, err) {
  var detail = 'JS Error: ' + msg + '\nURL: ' + url + '\nLine: ' + line + '\nCol: ' + col;
  if (err && err.stack) detail += '\nStack: ' + err.stack;
  var el = document.getElementById('root');
  if (el) el.innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap;font-size:12px;">' + detail + '</pre>';
  console.error(detail);
};
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled rejection:', e.reason);
});
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #333; font-size: 13px; -webkit-font-smoothing: antialiased; }
/* ===== Sidebar ===== */
.app-sider { background: #1e2a3a !important; }
.app-sider .ant-menu { background: transparent !important; font-size: 13px; }
.app-sider .ant-menu-item { color: rgba(255,255,255,0.65) !important; height: 40px !important; line-height: 40px !important; margin: 2px 6px !important; border-radius: 6px !important; overflow: hidden !important; }
.app-sider .ant-menu-item-selected { background: rgba(255,255,255,0.12) !important; color: #fff !important; }
.app-sider .ant-menu-item:hover { color: #fff !important; background: rgba(255,255,255,0.06) !important; }
.app-sider .ant-menu-inline-collapsed .ant-menu-item { padding-inline: 0 !important; text-align: center; }
.app-sider .ant-menu-item .ant-menu-item-icon { font-size: 15px !important; }
.logo-area { padding: 16px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.logo-area h1 { font-size: 16px; font-weight: 700; color: #fff; margin: 0; letter-spacing: -0.3px; }
.logo-area .logo-sub { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.ant-layout-sider-trigger { background: #1e2a3a !important; color: rgba(255,255,255,0.5) !important; border-top: 1px solid rgba(255,255,255,0.06) !important; height: 40px !important; line-height: 40px !important; font-size: 12px; }
/* ===== Header ===== */
.app-header { height: 48px; background: #fff !important; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e8e8; }
.app-header .ant-breadcrumb { font-size: 13px; }
/* ===== Content ===== */
.app-content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 48px); overflow: auto; }
/* ===== KPI Cards ===== */
.stat-card { background: #fff; border-radius: 6px; padding: 16px 20px; border: 1px solid #e8e8e8; }
.stat-card .stat-value { font-size: 22px; font-weight: 700; color: #1a1a2e; margin: 2px 0; letter-spacing: -0.5px; }
.stat-card .stat-label { font-size: 12px; color: #999; }
.stat-card .stat-change { font-size: 11px; margin-top: 2px; }
.stat-change.up { color: #52c41a; }
.stat-change.down { color: #ff4d4f; }
/* ===== Chart ===== */
.chart-box { background: #fff; border-radius: 6px; padding: 16px; border: 1px solid #e8e8e8; }
/* ===== Page Header ===== */
.page-header { margin-bottom: 16px; }
.page-header h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; margin: 0; }
.page-header p { font-size: 12px; color: #999; margin-top: 2px; }
/* ===== Filter Bar ===== */
.filter-bar { background: #fff; border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; border: 1px solid #e8e8e8; }
/* ===== Data Table ===== */
.data-table { background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #e8e8e8; }
.data-table .ant-table { font-size: 12px; }
.data-table .ant-table-thead > tr > th { background: #fafafa !important; font-size: 12px; font-weight: 600; color: #666; padding: 10px 12px !important; }
.data-table .ant-table-tbody > tr > td { padding: 8px 12px !important; color: #333; }
.data-table .ant-table-tbody > tr:hover > td { background: #f5f8ff !important; }
/* ===== Tags ===== */
.platform-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; margin-right: 3px; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.status-dot.active, .status-dot.enabled, .status-dot.ACTIVE { background: #52c41a; }
.status-dot.paused, .status-dot.disabled, .status-dot.PAUSED { background: #faad14; }
.status-dot.draft, .status-dot.DRAFT { background: #d9d9d9; }
.status-dot.fatigued { background: #ff4d4f; }
.status-dot.pending_review, .status-dot.IN_REVIEW { background: #1677ff; }
.status-dot.ARCHIVED { background: #8c8c8c; }
.status-dot.BUDGET_DEPLETED, .status-dot.rejected { background: #ff4d4f; }
/* ===== Misc ===== */
.rule-cond { background: #f5f5f5; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; margin: 2px 0; color: #555; }
.score-bar { height: 4px; border-radius: 2px; background: #f0f0f0; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
.kpi-mini { text-align: center; padding: 10px 8px; }
.kpi-mini .kpi-val { font-size: 16px; font-weight: 700; color: #1a1a2e; }
.kpi-mini .kpi-label { font-size: 11px; color: #999; margin-top: 2px; }
.thumb-box { width: 48px; height: 48px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; }
.objective-card { border: 1px solid #e8e8e8; border-radius: 6px; padding: 12px; cursor: pointer; transition: all 0.15s; }
.objective-card.selected { border-color: #4e83fd; background: #f0f5ff; }
.objective-card:hover { border-color: #91caff; }
/* ===== Ant overrides ===== */
.ant-tag { font-size: 11px; }
.ant-btn { font-size: 13px; border-radius: 4px; }
.ant-select { font-size: 12px; }
.ant-input { font-size: 12px; }
.ant-modal-title { font-size: 15px !important; font-weight: 600 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const { Layout, Menu, Table, Tag, Space, Select, Button, Card, Row, Col, Input, Modal, Descriptions, Tooltip, Progress, Spin, Switch, Dropdown, Segmented, message, Checkbox, Radio, DatePicker, InputNumber, Tabs, Divider, Alert, Breadcrumb, Badge, Steps, Popconfirm } = antd;
const { Header, Sider, Content } = Layout;

// ===== 工具函数 =====
const fmtCurrency = (v) => v == null ? '-' : (v >= 1000 ? `$${(v/1000).toFixed(1)}K` : `$${Number(v).toFixed(2)}`);
const fmtNum = (v) => v == null ? '-' : (v >= 1000000 ? (v/1000000).toFixed(1) + 'M' : v >= 1000 ? (v/1000).toFixed(1) + 'K' : String(v));
const fmtPct = (v) => v == null ? '-' : `${Number(v).toFixed(2)}%`;

// ===== API =====
const api = {
  async get(url) {
    const res = await fetch(url);
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.message || '请求失败');
    return json.data;
  },
  async post(url, body) {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.message || '请求失败');
    return json.data;
  },
  async put(url, body) {
    const res = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.message || '请求失败');
    return json.data;
  },
  async del(url) {
    const res = await fetch(url, { method: 'DELETE' });
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.message || '请求失败');
    return json.data;
  }
};

// ===== 平台配置 =====
const PLATFORM_COLORS = { Meta: '#1877F2', TikTok: '#010101', AppLovin: '#00C853', Almedia: '#FF6D00', Trademob: '#7C4DFF' };
const PLATFORM_BG = { Meta: '#e6f4ff', TikTok: '#f5f5f5', AppLovin: '#e8f5e9', Almedia: '#fff3e0', Trademob: '#f3e5f5' };

// ===== EChart 组件 =====
function EChart({ option, height = 300 }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (!chartRef.current) chartRef.current = echarts.init(ref.current);
    chartRef.current.setOption(option, true);
    const onResize = () => chartRef.current?.resize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [option]);
  return React.createElement('div', { ref, style: { height } });
}

// ===== PlatformTag =====
function PlatformTag({ name }) {
  const cls = (name || '').toLowerCase().replace(/\s/g, '');
  const style = { background: PLATFORM_BG[name] || '#f5f5f5', color: PLATFORM_COLORS[name] || '#333' };
  return React.createElement('span', { className: `platform-tag`, style }, name);
}

// ===== StatusDisplay =====
function StatusDisplay({ status }) {
  const labels = { ACTIVE: '投放中', PAUSED: '已暂停', DRAFT: '草稿', ARCHIVED: '已归档', IN_REVIEW: '审核中', BUDGET_DEPLETED: '预算耗尽', active: '投放中', fatigued: '已疲劳', paused: '已暂停', pending_review: '待审核', rejected: '已拒绝', enabled: '已启用', disabled: '已禁用' };
  return React.createElement('span', null,
    React.createElement('span', { className: `status-dot ${(status || '').toLowerCase()}` }),
    labels[status] || status
  );
}

// ===== ScoreBar =====
function ScoreBar({ score }) {
  const s = Number(score) || 0;
  const color = s >= 80 ? '#52c41a' : s >= 50 ? '#faad14' : '#ff4d4f';
  return React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
    React.createElement('div', { className: 'score-bar', style: { width: 60 } },
      React.createElement('div', { className: 'score-bar-fill', style: { width: `${Math.min(100, s)}%`, background: color } })
    ),
    React.createElement('span', { style: { fontSize: 12, fontWeight: 500 } }, s)
  );
}

// ===== CreativeThumb =====
function CreativeThumb({ type, thumbColor }) {
  const bg = thumbColor || '#4a90d9';
  const icon = type === 'video' ? '▶' : type === 'image' ? '🖼' : type === 'playable' ? '▶' : type === 'carousel' ? '📷' : '?';
  return React.createElement('div', { className: 'thumb-box', style: { background: bg } }, icon);
}

// ===== Dashboard 总览 =====
function DashboardPage() {
  const [overview, setOverview] = useState(null);
  const [campStats, setCampStats] = useState(null);
  const [ruleStats, setRuleStats] = useState(null);
  const [trendData, setTrendData] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      api.get('/api/data/overview'),
      api.get('/api/campaigns/stats'),
      api.get('/api/rules/stats'),
      api.get('/api/data/report?dimension=date&page=1&page_size=30'),
    ]).then(([ov, cs, rs, report]) => {
      setOverview(ov);
      setCampStats(cs);
      setRuleStats(rs);
      setTrendData((report.items || []).sort((a, b) => (a.date || '').localeCompare(b.date || '')));
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  if (loading) return React.createElement('div', { style: { textAlign: 'center', padding: 100 } }, React.createElement(Spin, { size: 'large' }));

  const statCards = [
    { label: '今日花费', value: fmtCurrency(overview?.total_spend), change: '+12.3%', up: true },
    { label: '总安装量', value: fmtNum(overview?.total_installs), change: '+8.7%', up: true },
    { label: '平均CPI', value: overview?.avg_cpi ? `$${overview.avg_cpi}` : '-', change: '-5.2%', up: false },
    { label: '平均CTR', value: overview?.avg_ctr != null ? `${overview.avg_ctr}%` : '-', change: '+0.3%', up: true },
    { label: 'ROAS D7', value: overview?.avg_roas_d7 != null ? `${(overview.avg_roas_d7 * 100).toFixed(0)}%` : '-', change: '+3.1%', up: true },
    { label: '活跃Campaign数', value: campStats?.active ?? 0, change: '+4', up: true },
  ];

  const trendOption = {
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
    legend: { data: ['花费', '安装量'], bottom: 0 },
    grid: { left: 50, right: 50, top: 30, bottom: 50 },
    xAxis: { type: 'category', data: trendData.map(t => (t.date || '').slice(5)), axisLabel: { fontSize: 10 } },
    yAxis: [
      { type: 'value', name: '花费', axisLabel: { formatter: v => fmtCurrency(v) } },
      { type: 'value', name: '安装量', axisLabel: { formatter: v => fmtNum(v) } },
    ],
    series: [
      { name: '花费', type: 'line', data: trendData.map(t => t.spend), smooth: true, yAxisIndex: 0, lineStyle: { color: '#1677ff', width: 2 }, itemStyle: { color: '#1677ff' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(22,119,255,0.3)' }, { offset: 1, color: 'rgba(22,119,255,0.02)' }] } } },
      { name: '安装量', type: 'bar', data: trendData.map(t => t.installs), yAxisIndex: 1, itemStyle: { borderRadius: [4, 4, 0, 0], color: '#52c41a' } },
    ],
  };

  const platformPieOption = {
    tooltip: { trigger: 'item', formatter: (p) => `${p.name}: $${p.value.toLocaleString()} (${p.percent}%)` },
    legend: { bottom: 0, textStyle: { fontSize: 11 } },
    series: [{
      type: 'pie', radius: ['45%', '72%'], center: ['50%', '42%'],
      data: Object.entries(overview?.spend_by_platform || {}).map(([k, v]) => ({ name: k, value: Math.round(v) })),
      itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
      color: ['#1877F2', '#010101', '#00C853', '#FF6D00', '#7C4DFF'],
    }],
  };

  const recentLogs = (ruleStats?.recent_logs || []).slice(0, 6);
  const resultColors = { executed: '#52c41a', pending_approval: '#faad14', rejected: '#ff4d4f', failed: '#ff4d4f' };

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('h2', null, '总览'),
      React.createElement('p', null, '全局投放数据总览 · 实时监控各平台关键指标')
    ),
    React.createElement(Row, { gutter: [16, 16] },
      statCards.map((s, i) =>
        React.createElement(Col, { key: i, xs: 12, sm: 8, lg: 4 },
          React.createElement('div', { className: 'stat-card' },
            React.createElement('div', { className: 'stat-label' }, s.label),
            React.createElement('div', { className: 'stat-value' }, s.value),
            s.change && React.createElement('div', { className: `stat-change ${s.up ? 'up' : 'down'}` }, s.up ? '↑ ' + s.change : '↓ ' + s.change)
          )
        )
      )
    ),
    React.createElement(Row, { gutter: [16, 16], style: { marginTop: 16 } },
      React.createElement(Col, { xs: 24, lg: 16 },
        React.createElement('div', { className: 'chart-box' },
          React.createElement('div', { style: { fontWeight: 600, marginBottom: 12 } }, '花费与安装趋势'),
          React.createElement(EChart, { option: trendOption, height: 320 })
        )
      ),
      React.createElement(Col, { xs: 24, lg: 8 },
        React.createElement('div', { className: 'chart-box' },
          React.createElement('div', { style: { fontWeight: 600, marginBottom: 12 } }, '平台花费占比'),
          React.createElement(EChart, { option: platformPieOption, height: 320 })
        )
      )
    ),
    React.createElement(Row, { gutter: [16, 16], style: { marginTop: 16 } },
      React.createElement(Col, { xs: 24, lg: 14 },
        React.createElement('div', { className: 'chart-box' },
          React.createElement('div', { style: { fontWeight: 600, marginBottom: 12 } }, '各平台安装量'),
          React.createElement(EChart, { option: {
            tooltip: { trigger: 'axis' },
            grid: { left: 50, right: 20, top: 20, bottom: 30 },
            xAxis: { type: 'category', data: Object.keys(overview?.installs_by_platform || {}) },
            yAxis: { type: 'value', axisLabel: { formatter: v => fmtNum(v) } },
            series: [{ type: 'bar', data: Object.values(overview?.installs_by_platform || {}), itemStyle: { borderRadius: [6, 6, 0, 0], color: p => ['#1877F2', '#010101', '#00C853', '#FF6D00', '#7C4DFF'][p.dataIndex] } }],
          }, height: 260 })
        )
      ),
      React.createElement(Col, { xs: 24, lg: 10 },
        React.createElement('div', { className: 'chart-box', style: { height: '100%' } },
          React.createElement('div', { style: { fontWeight: 600, marginBottom: 12 } }, '最近规则执行'),
          React.createElement(Table, {
            size: 'small', pagination: false,
            dataSource: recentLogs.map((l, i) => ({ ...l, key: i })),
            columns: [
              { title: '规则', dataIndex: 'rule_name', width: 140, ellipsis: true },
              { title: '动作', dataIndex: 'action', width: 90, render: a => React.createElement(Tag, { color: (a || '').includes('pause') ? 'red' : a === 'alert_only' ? 'blue' : 'orange' }, (a || '').replace(/_/g, ' ')) },
              { title: '结果', dataIndex: 'result', width: 90, render: r => React.createElement(Tag, { color: resultColors[r] || 'default' }, r === 'executed' ? '已执行' : r === 'pending_approval' ? '待审批' : r === 'rejected' ? '已拒绝' : r === 'failed' ? '失败' : r) },
            ],
          })
        )
      )
    )
  );
}

// ===== 素材管理 =====
function CreativePage() {
  const [data, setData] = useState({ items: [], total: 0 });
  const [loading, setLoading] = useState(true);
  const [filters, setFilters] = useState({ page: 1, type: null, status: null, platform: null, sort_by: 'score', sort_order: 'desc', search: '' });
  const [stats, setStats] = useState(null);
  const [detail, setDetail] = useState(null);

  const load = useCallback(() => {
    setLoading(true);
    const params = new URLSearchParams();
    params.set('page', filters.page);
    params.set('page_size', '15');
    if (filters.type) params.set('type', filters.type);
    if (filters.status) params.set('status', filters.status);
    if (filters.platform) params.set('platform', filters.platform);
    params.set('sort_by', filters.sort_by);
    params.set('sort_order', filters.sort_order);
    if (filters.search) params.set('search', filters.search);
    api.get(`/api/creatives?${params}`).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  }, [filters]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => { api.get('/api/creatives/stats').then(setStats).catch(() => {}); }, []);

  const columns = [
    { title: '缩略图', dataIndex: 'type', width: 80, render: (t, r) => React.createElement(CreativeThumb, { type: t, thumbColor: r.thumb_color }) },
    { title: '名称', dataIndex: 'name', width: 200, ellipsis: true },
    { title: '类型', dataIndex: 'type', width: 90, render: t => React.createElement(Tag, { color: t === 'video' ? 'blue' : t === 'image' ? 'green' : t === 'playable' ? 'purple' : 'cyan' }, t === 'video' ? '视频' : t === 'image' ? '图片' : t === 'playable' ? '试玩' : '轮播') },
    { title: '风格', dataIndex: 'style', width: 90 },
    { title: '状态', dataIndex: 'status', width: 90, render: s => React.createElement(StatusDisplay, { status: s }) },
    { title: '宽高比', dataIndex: 'aspect_ratio', width: 80 },
    { title: '平台', dataIndex: 'platforms', width: 150, render: ps => (ps || []).map(p => React.createElement(PlatformTag, { key: p, name: p })) },
    { title: '评分', dataIndex: 'score', width: 100, render: s => React.createElement(ScoreBar, { score: s }) },
    { title: 'IPM', dataIndex: 'ipm', width: 70, render: v => v != null ? v : '-' },
    { title: 'CTR%', dataIndex: 'ctr', width: 70, render: v => v != null ? v + '%' : '-' },
    { title: 'CPI', dataIndex: 'cpi', width: 70, render: v => v != null ? `$${v}` : '-' },
    { title: '花费', dataIndex: 'spend', width: 90, render: v => fmtCurrency(v) },
    { title: '关联Campaign数', dataIndex: 'associated_campaigns', width: 110 },
    { title: '操作', width: 80, render: (_, r) => React.createElement(Button, { type: 'link', size: 'small', onClick: () => setDetail(r) }, '详情') },
  ];

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('h2', null, '素材管理'),
      React.createElement('p', null, '分析、分类、排序与智能推送 · 跨平台素材效果追踪')
    ),
    stats && React.createElement(Row, { gutter: [12, 12], style: { marginBottom: 16 } },
      [
        { label: '素材总数', value: stats.total },
        { label: '投放中', value: stats.active },
        { label: '已疲劳', value: stats.fatigued },
        { label: '待审核', value: stats.pending },
        { label: '平均评分', value: stats.avg_score != null ? stats.avg_score.toFixed(1) : '-' },
