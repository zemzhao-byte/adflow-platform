    put: function(url, body) { return mockPut(url, body).then(function(res) { if (res.code !== 0) throw new Error(res.message); return res.data; }); },
    del: function(url) { return mockDel(url).then(function(res) { if (res.code !== 0) throw new Error(res.message); return res.data; }); }
  };

  // Override fetch to intercept /api/* for direct fetch calls (e.g. templates)
  var _fetch = window.fetch;
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.indexOf('/api/') === 0) {
      var method = (opts && opts.method) || 'GET';
      var body = opts && opts.body;
      var parsed = typeof body === 'string' ? (function() { try { return JSON.parse(body); } catch(e) { return {}; } })() : {};
      if (method === 'GET') {
        return mockGet(url).then(function(res) { return { ok: res.code === 0, json: function() { return Promise.resolve(res); } }; });
      }
      if (method === 'POST') {
        return mockPost(url, parsed).then(function(res) { return { ok: res.code === 0, json: function() { return Promise.resolve(res); } }; });
      }
      if (method === 'PUT') {
        return mockPut(url, parsed).then(function(res) { return { ok: res.code === 0, json: function() { return Promise.resolve(res); } }; });
      }
      if (method === 'DELETE') {
        return mockDel(url).then(function(res) { return { ok: res.code === 0, json: function() { return Promise.resolve(res); } }; });
      }
    }
    return _fetch.apply(this, arguments);
  };
})();

const PLATFORM_COLORS = { Meta: '#1877F2', TikTok: '#010101', AppLovin: '#00C853', Almedia: '#FF6D00', Trademob: '#7C4DFF' };
const PLATFORM_BG = { Meta: '#e6f4ff', TikTok: '#f5f5f5', AppLovin: '#e8f5e9', Almedia: '#fff3e0', Trademob: '#f3e5f5' };

// ===== EChart 组件 =====
function EChart({ option, height = 300 }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (!chartRef.current) chartRef.current = echarts.init(ref.current);
    chartRef.current.setOption(option, true);
    const onResize = () => chartRef.current?.resize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [option]);
  return React.createElement('div', { ref, style: { height } });
}

// ===== PlatformTag =====
function PlatformTag({ name }) {
  const cls = (name || '').toLowerCase().replace(/\s/g, '');
  const style = { background: PLATFORM_BG[name] || '#f5f5f5', color: PLATFORM_COLORS[name] || '#333' };
  return React.createElement('span', { className: `platform-tag`, style }, name);
}
